# 데이터 신호등 — 기계판정 규칙 (전 에이전트 공용)
# 요구단계 사전 분류. 코드단계 실제 탐지는 gvskb(GOV-PII-*)가 담당(상호 보완).

green:
  설명: 공개 가능 자료
  허용: [공개 통계·조례·규칙·보도자료, 공공데이터포털, 샘플·가명 테스트 데이터]
  절차: 추가 절차 없음. 게이트 경량/생략 가능.

yellow:
  설명: 내부 업무자료(비공개)
  조건: [부서 책임자 확인, 행정망 내 처리]
  프롬프트_입력_금지: [원문 공문 전문, 내부 검토자료 전문]
  절차: 표준 게이트(scan_path 1회).

red:
  설명: 개인정보·민감정보·비공개 한정 정보
  조치: [외부 LLM 입력 금지, 실데이터 개발 금지, 가명·더미 대체, 개인정보 협의 트리거]
  감지_패턴:
    - 주민등록번호
    - 전화번호
    - 계좌번호
    - 병력·재산 관련 컬럼
    - name / phone / ssn / rrn / account 등 컬럼명
  절차: 법적·기술적 가중조치 + 개인정보보호 부서 협의. 게이트 필수.

# 판정 우선순위: 자기보고 < 실제 자료·코드 증거.
#  requirement-analyst 답변과 예시 자료가 다르면 자료를 우선.
#  security-reviewer가 코드에서 red 패턴을 재확인(질문만 믿지 않음).
