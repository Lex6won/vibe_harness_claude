# gg-dashboard 앞단 nginx 참조 설정. 내부 한정. 접근제어=Keycloak, 보안헤더=여기서.
server {
  listen 80;
  server_name _;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Content-Security-Policy "default-src 'self'; object-src 'none'; frame-ancestors 'none'" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # (필수) Keycloak OIDC 접근제어를 앞단에 둔다 — 인증 없이 노출 금지.
  #   예: auth_request 또는 oauth2-proxy.

  location = /health { proxy_pass http://127.0.0.1:8501/_stcore/health; }
  location / {
    proxy_pass http://127.0.0.1:8501/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;      # Streamlit WebSocket
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }
}
